server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: mindagent-agent
  autoconfigure:
    exclude: ${SPRING_AUTOCONFIGURE_EXCLUDE:org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration}
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3308/mindagent?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  ai:
    openai:
      # Spring AI side models: default to Qwen OpenAI-compatible cloud endpoint.
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${SPRING_AI_OPENAI_API_KEY:${QWEN_API_KEY:}}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_MODEL:qwen-plus}
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      chroma:
        initialize-schema: ${CHROMA_INIT_SCHEMA:true}
        collection-name: ${CHROMA_COLLECTION:mindagent_knowledge}
        tenant-name: ${CHROMA_TENANT:SpringAiTenant}
        database-name: ${CHROMA_DATABASE:SpringAiDatabase}
        client:
          host: ${CHROMA_HOST:http://127.0.0.1}
          port: ${CHROMA_PORT:18001}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:123456}
      database: ${REDIS_DB:0}
      timeout: ${REDIS_TIMEOUT:2s}

mindagent:
  ai:
    use-requested-model: ${AI_USE_REQUESTED_MODEL:false}
    chat:
      provider: ${AI_CHAT_PROVIDER:dashscope}
      model: ${AI_CHAT_MODEL:qwen-plus}
      tool-calling-enabled: ${AI_CHAT_TOOL_CALLING_ENABLED:true}
    agent:
      provider: ${AI_AGENT_PROVIDER:dashscope}
      model: ${AI_AGENT_MODEL:qwen-plus}
      tool-calling-enabled: ${AI_AGENT_TOOL_CALLING_ENABLED:true}
    embedding:
      provider: ${AI_EMBEDDING_PROVIDER:dashscope}
      model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
    rerank:
      provider: ${AI_RERANK_PROVIDER:dashscope}
      model: ${AI_RERANK_MODEL:qwen3-rerank}
  vllm:
    # Reserved for compatibility fallback. The current main chat and tool calling path uses Spring AI + DashScope.
    base-url: ${VLLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
    api-key: ${VLLM_API_KEY:${QWEN_API_KEY:}}
    model: ${VLLM_MODEL:qwen-plus}
    chat-path: /v1/chat/completions
  rag:
    enabled: ${RAG_ENABLED:true}
    provider: ${RAG_PROVIDER:local}
    fallback-to-local: ${RAG_FALLBACK_TO_LOCAL:true}
    top-k: ${RAG_TOP_K:5}
    bm25-top-k: ${RAG_BM25_TOP_K:30}
    vector-top-k: ${RAG_VECTOR_TOP_K:30}
    final-top-k: ${RAG_FINAL_TOP_K:5}
    rrf-k: ${RAG_RRF_K:60}
    max-context-tokens: ${RAG_MAX_CONTEXT_TOKENS:2500}
    max-chunks-per-doc: ${RAG_MAX_CHUNKS_PER_DOC:2}
    min-chunk-length: ${RAG_MIN_CHUNK_LEN:40}
    knowledge-dir: ${RAG_KNOWLEDGE_DIR:backend/storage/knowledge}
    psychology-knowledge:
      bm25-weight: ${RAG_PSYCHOLOGY_BM25_WEIGHT:0.4}
      vector-weight: ${RAG_PSYCHOLOGY_VECTOR_WEIGHT:0.6}
    appointment-process:
      bm25-weight: ${RAG_APPOINTMENT_BM25_WEIGHT:0.7}
      vector-weight: ${RAG_APPOINTMENT_VECTOR_WEIGHT:0.3}
    rerank:
      enabled: ${RAG_RERANK_ENABLED:true}
      base-url: ${RAG_RERANK_BASE_URL:https://dashscope.aliyuncs.com/compatible-api/v1}
      api-key: ${RAG_RERANK_API_KEY:${QWEN_API_KEY:${DASHSCOPE_API_KEY:}}}
      path: ${RAG_RERANK_PATH:/reranks}
      model: ${RAG_RERANK_MODEL:qwen3-rerank}
      candidate-top-k: ${RAG_RERANK_CANDIDATE_TOP_K:30}
      top-n: ${RAG_RERANK_TOP_N:5}
      instruct: ${RAG_RERANK_INSTRUCT:Given a user question, rank the retrieved passages by how well they directly answer the question.}
  memory:
    redis-enabled: ${MEMORY_REDIS_ENABLED:true}
    recent-key-prefix: ${MEMORY_RECENT_KEY_PREFIX:mindagent:chat:recent}
    recent-ttl-minutes: ${MEMORY_RECENT_TTL_MINUTES:1440}
    recent-keep-turns: ${MEMORY_RECENT_KEEP_TURNS:6}
    input-budget: ${MEMORY_INPUT_BUDGET:6144}
    compress-trigger-tokens: ${MEMORY_COMPRESS_TRIGGER_TOKENS:3000}
    summary-target-tokens: ${MEMORY_SUMMARY_TARGET_TOKENS:700}
    summary-hard-limit-tokens: ${MEMORY_SUMMARY_HARD_LIMIT_TOKENS:1000}
    rag-budget: ${MEMORY_RAG_BUDGET:2000}
    min-rag-budget: ${MEMORY_MIN_RAG_BUDGET:800}
  mcp:
    enabled: ${MCP_ENABLED:true}
    excel:
      enabled: ${MCP_EXCEL_ENABLED:true}
      url: ${MCP_EXCEL_URL:http://localhost:${SERVER_PORT:8082}/api/mock/mcp/excel/write}
    email:
      enabled: ${MCP_EMAIL_ENABLED:true}
      url: ${MCP_EMAIL_URL:http://localhost:${SERVER_PORT:8082}/api/mock/mcp/email/send}
    retry:
      max-attempts: ${MCP_RETRY_MAX_ATTEMPTS:3}
      delay-ms: ${MCP_RETRY_DELAY_MS:300}
  auth:
    jwt-secret: ${JWT_SECRET:mindagent-local-dev-secret-key-change-me-1234567890}
    issuer: ${JWT_ISSUER:mindagent-agent}
    expires-minutes: ${JWT_EXPIRES_MINUTES:120}
    refresh-expires-days: ${JWT_REFRESH_EXPIRES_DAYS:7}
