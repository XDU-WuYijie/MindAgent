services:
  mindagent-mysql:
    image: mysql:8.4
    container_name: mindagent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: mindagent
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "3308:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./backend/src/main/resources/db/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mindagent-redis:
    image: redis:7.4-alpine
    container_name: mindagent-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "123456"]
    ports:
      - "6380:6379"
    volumes:
      - ./docker/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mindagent-chroma:
    image: chromadb/chroma:0.5.23
    container_name: mindagent-chroma
    ports:
      - "18001:8000"
    volumes:
      - ./docker/chroma/data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  mindagent-nginx:
    image: nginx:1.27-alpine
    container_name: mindagent-nginx
    ports:
      - "8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
